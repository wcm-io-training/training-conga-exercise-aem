# Build validation

name: Build

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        java: [21]
        os: [ubuntu-latest]
        distribution: [temurin]

    steps:
      - name: Maven Build
        uses: wcm-io-devops/github-action-maven-build@v1
        with:
          java-version: ${{ matrix.java }}
